services:
  mariadb:
    image: mariadb:11.8
    container_name: codexion-db
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: DbPass1@@
      MARIADB_DATABASE: codexion
      MARIADB_USER: codexion
      MARIADB_PASSWORD: codexion1@@
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  cloud:
    build:
      context: .
      dockerfile: cloud/docker/Dockerfile
    image: codexion-cloud:latest
    container_name: codexion-cloud
    depends_on:
      - mariadb
    ports:
      - "8000:8000"    # Frappe backend
      - "8080:8080"    # FastAPI
      - "3000:3000"    # React dev server (optional)
      - "5173:5173"    # React dev server (optional)
      - "22:22"        # SSH/SFTP (only if needed)
      - "9000:9000"    # Optional: code-server or admin UI
      - "9001:9001"    # Optional: code-server or admin UI
    volumes:
      - cloud_volume:/home/devops
      - ./cloud/supervisor:/etc/supervisor/conf.d
    tty: true
    restart: unless-stopped

  nginx:
    image: nginx:1.25
    container_name: codexion-nginx
    depends_on:
      - cloud
    ports:
      - "80:80"
    volumes:
      - ./cloud/docker/cloud-nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cloud/frontend/react/dist:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  cloud_volume:
  db_data:

