services:
  mariadb:
    image: mariadb:11.8
    container_name: mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: DbPass1@@
      MARIADB_DATABASE: codexion
      MARIADB_USER: codexion
      MARIADB_PASSWORD: codexion1@@
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3306:3306"

  frappe:
    build:
      context: .
      dockerfile: cloud/docker/Dockerfile-frappe
    image: codexion-cloud:latest
    container_name: codexion-cloud
    depends_on:
      - mariadb
    ports:
      - "8000:8000"
    volumes:
      - cloud_volume:/home/devops
      - ./cloud/supervisor:/etc/supervisor/conf.d
    tty: true
    restart: unless-stopped

  nginx:
    image: nginx:1.25
    container_name: nginx
    depends_on:
      - frappe
    ports:
      - "80:80"
    volumes:
      - ./cloud/docker/cloud-nginx.conf:/etc/nginx/nginx.conf:ro
      - ./cloud/frontend/react/dist:/usr/share/nginx/html:ro
    restart: unless-stopped

volumes:
  cloud_volume:
  db_data:
